{{ define "main" }}
<section class="page-head">
  <div class="shell">
    <div class="eyebrow">{{ .Title }}</div>
    <h1>{{ .Title }}</h1>
    <p>{{ len .Data.Terms.Alphabetical }} {{ i18n "tags_total" | default "tags" }}</p>
  </div>
</section>
<section class="list-section">
  <div class="shell">
    <div class="tag-cloud">
      {{ range .Data.Terms.ByCount }}
        <a class="tag-pill" href="{{ .Page.Permalink }}">
          <span class="tag-name">{{ .Page.Title }}</span>
          <span class="tag-count">{{ .Count }}</span>
        </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
