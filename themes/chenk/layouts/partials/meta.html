{{- $p := . -}}
<div class="meta">
  <time datetime="{{ $p.Date.Format "2006-01-02" }}">{{ $p.Date.Format "January 2, 2006" }}</time>
  <span class="dot"></span>
  <span class="reading-time">{{ $p.ReadingTime }} {{ i18n "minutes_short" }}</span>
  <span class="dot"></span>
  <span class="word-count">{{ $p.WordCount }} {{ i18n "words" }}</span>
  {{ if $p.IsTranslated }}<span class="dot"></span><span class="lang-pill">{{ $p.Lang }}</span>{{ end }}
</div>
