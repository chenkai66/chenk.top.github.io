{{ if .Site.Params.giscus.enabled }}
<section class="comments-section">
  <div class="comments-divider"></div>
  <h3 class="comments-title">{{ if eq .Lang "zh" }}评论{{ else }}Comments{{ end }}</h3>
  <p class="comments-note">
    {{ if eq .Lang "zh" }}用 GitHub 账号评论，讨论同步到{{ else }}Sign in with GitHub to comment. All discussions live in{{ end }}
    <a href="https://github.com/{{ .Site.Params.giscus.repo }}/discussions" target="_blank" rel="noopener">GitHub Discussions</a>.
  </p>
  <script src="https://giscus.app/client.js"
    data-repo="{{ .Site.Params.giscus.repo }}"
    data-repo-id="{{ .Site.Params.giscus.repoId }}"
    data-category="{{ .Site.Params.giscus.category }}"
    data-category-id="{{ .Site.Params.giscus.categoryId }}"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="{{ if eq .Lang "zh" }}zh-CN{{ else }}en{{ end }}"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</section>
{{ end }}
