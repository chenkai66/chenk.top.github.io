{{ define "main" }}
<article class="about-page">
  <div class="shell about-shell">
    <header class="about-head">
      <div class="about-avatar" aria-hidden="true"><img src="https://blog-pic-ck.oss-cn-beijing.aliyuncs.com/posts/avatar/chenkai.jpg?x-oss-process=image/format,webp/quality,q_85/resize,w_200" alt="" loading="eager" decoding="async"></div>
      <div class="about-head-text">
        <div class="about-eyebrow">{{ i18n "about" }}</div>
        <div class="about-tagline">{{ if eq .Lang "zh" }}工程师 · 写作者{{ else }}Engineer &middot; Writer{{ end }}</div>
      </div>
    </header>
    <div class="about-body prose">
      {{ if .Content }}
        {{ .Content }}
      {{ else }}
        {{ if eq .Lang "zh" }}<p>暂无内容。</p>{{ else }}<p>About page content is pending.</p>{{ end }}
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
