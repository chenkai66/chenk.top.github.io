{{- $url := .Destination -}}
{{- $external := or (hasPrefix $url "http://") (hasPrefix $url "https://") -}}
<a href="{{ $url | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $external }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text | safeHTML }}{{ if $external }} <span aria-hidden="true" style="font-size:0.75em; opacity:0.55; margin-left:2px;">↗</span>{{ end }}</a>
