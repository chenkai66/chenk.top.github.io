{{- $src := .Destination | safeURL -}}
{{- $alt := .Text -}}
{{- $title := .Title -}}
{{- $ossProcess := "" -}}
{{- if strings.Contains (string $src) "blog-pic-ck.oss-cn-beijing.aliyuncs.com" -}}
  {{- $ossProcess = "?x-oss-process=image/format,webp/quality,q_85/resize,w_800" -}}
{{- end -}}
<figure class="article-figure">
  <img src="{{ $src }}{{ $ossProcess }}" alt="{{ $alt }}" loading="lazy" decoding="async"{{ with $title }} title="{{ . }}"{{ end }} class="content-image">
  {{ with $title }}<figcaption>{{ . }}</figcaption>{{ end }}
</figure>
