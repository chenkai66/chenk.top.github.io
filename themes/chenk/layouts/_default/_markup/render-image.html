{{- $src := .Destination | safeURL -}}
{{- $alt := .Text -}}
{{- $title := .Title -}}
<figure class="article-figure">
  <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" decoding="async"{{ with $title }} title="{{ . }}"{{ end }} class="content-image">
  {{ with $title }}<figcaption>{{ . }}</figcaption>{{ end }}
</figure>
