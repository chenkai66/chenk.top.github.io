# Hugo configuration for chenk.top
# Server-side build target: 1500+ articles, bilingual EN/ZH

baseURL = "https://www.chenk.top/"
title = "Chen Kai Blog"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
hasCJKLanguage = true

# Use the custom theme we'll build
theme = "chenk"

# Post URL pattern: /en/aliyun-pai/01-platform-overview/ etc.
[permalinks]
  posts = "/:sections/:slug/"

# Pagination — fast, no need for huge per-page
[pagination]
  pagerSize = 10
  path = "page"

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON for search index
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true              # allow inline HTML in markdown
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]
  [markup.highlight]
    style = "one-dark"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false             # use CSS classes, not inline styles
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    [languages.en.params]
      description = "Machine Learning, Mathematics, and Computer Science — explained for humans."

  [languages.zh]
    languageURL = "/zh/"
    languageName = "简体中文"
    languageCode = "zh-CN"
    weight = 2
    contentDir = "content/zh"
    [languages.zh.params]
      description = "机器学习、数学、计算机系统——把硬核技术写得人能读懂。"

# Hugo will pick up content/en for default lang and content/zh for zh-cn
[module]
  [[module.mounts]]
    source = "content/en"
    target = "content"
    lang   = "en"
  [[module.mounts]]
    source = "content/zh"
    target = "content"
    lang   = "zh"

[params]
  author = "Chen Kai"
  ossBase = "https://blog-pic-ck.oss-cn-beijing.aliyuncs.com/posts"
  github = "https://github.com/chenkai66"
  email = "chenkai.nb.666@gmail.com"
  marketingDomain = "llm4marketing.com"

  [params.style]
    primary = "#2563eb"
    accent = "#7c3aed"

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Series"
    url = "/series/"
    weight = 2
  [[menus.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3
  [[menus.main]]
    name = "Archives"
    url = "/archives/"
    weight = 4
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 5

# Build performance: don't fail on missing translations
[build]
  writeStats = false

[params.giscus]
enabled = false
repo = "chenkai66/chenk.top.github.io"
repoId = "PLACEHOLDER_REPO_ID"
category = "Comments"
categoryId = "PLACEHOLDER_CATEGORY_ID"
