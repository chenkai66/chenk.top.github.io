<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head><body>
<p>Test 1 (auto-render): $\nabla f(x)$</p>
<p>Test 2 (span): <span class="math-inline">$\nabla f(x)$</span></p>
<p>Test 3 (span no delim): <span id="test3">\nabla f(x)</span></p>
<script>
// Auto-render on body
renderMathInElement(document.body, {
  delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
  throwOnError: false
});

// Also try direct render on test3
var el = document.getElementById('test3');
var math = el.textContent;
console.log('test3 textContent chars:', JSON.stringify(math));
console.log('test3 char codes:', Array.from(math).map(c => c.charCodeAt(0)));
katex.render(math, el, {throwOnError: false});
</script>
</body></html>
